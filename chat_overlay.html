<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Chat Twitch Overlay</title>
<style>
  body {
    margin: 0;
    background: transparent;
    overflow: hidden;
    font-family: Arial, sans-serif;
  }

  #chat {
    position: absolute;
    bottom: 10px;
    left: 10px;
    width: 450px;
    max-height: 600px;
    display: flex;
    flex-direction: column-reverse;
    overflow-y: auto;
  }

  .message {
    display: flex;
    align-items: center;
    margin: 2px 0;
    padding: 4px 8px;
    border-radius: 6px;
    font-size: 14px;
    animation: fadein 0.3s;
  }

  .avatar {
    width: 32px;
    height: 32px;
    border-radius: 50%;
    margin-right: 4px;
    flex-shrink: 0;
  }

  .badge {
    width: 18px;
    height: 18px;
    margin-right: 2px;
  }

  .username {
    font-weight: bold;
    padding: 2px 4px;
    border-radius: 4px;
    margin-right: 4px;
  }

  .message-text {
    color: white;
    text-shadow: 1px 1px 2px rgba(0,0,0,0.7);
  }

  @keyframes fadein {
    from {opacity: 0;}
    to {opacity: 1;}
  }
</style>
</head>
<body>
<div id="chat"></div>

<script src="https://cdn.jsdelivr.net/npm/tmi.js@1.8.5/dist/tmi.min.js"></script>
<script>
const chat = document.getElementById('chat');
const highlightColors = ['#A0D8FF','#FFF7A0','#E0E0E0'];
let colorIndex = 0;

// URLs badges Twitch officiels
const BADGE_MOD_URL = 'https://static-cdn.jtvnw.net/badges/v1/86fda9c4-0c06-4b96-bf09-1f3aa86749a5/1';
const BADGE_VIP_URL = 'https://static-cdn.jtvnw.net/badges/v1/106c8e1f-6a77-4d16-94e2-8ee3a5d0200a/1';
const BADGE_SUB_URL = 'https://static-cdn.jtvnw.net/badges/v1/63e3f60f-6e20-4b0f-8324-1389a0a1c1ff/1';
const BADGE_BROADCASTER_URL = 'https://static-cdn.jtvnw.net/badges/v1/15f1a3cb-0475-4373-88e0-d233f2f8b964/1';

// Fonction pour ajouter un message
function addMessage(user, text, avatarUrl, badges=[]) {
  const msg = document.createElement('div');
  msg.className = 'message';

  const avatar = document.createElement('img');
  avatar.className = 'avatar';
  avatar.src = avatarUrl;
  msg.appendChild(avatar);

  // Ajouter les badges
  badges.forEach(url => {
    const badge = document.createElement('img');
    badge.className = 'badge';
    badge.src = url;
    msg.appendChild(badge);
  });

  const username = document.createElement('span');
  username.className = 'username';
  username.textContent = user;
  username.style.backgroundColor = highlightColors[colorIndex];
  username.style.color = '#000000';
  colorIndex = (colorIndex + 1) % highlightColors.length;

  const messageText = document.createElement('span');
  messageText.className = 'message-text';
  messageText.textContent = `: ${text}`;

  msg.appendChild(username);
  msg.appendChild(messageText);
  chat.prepend(msg);
}

// TMI.js connexion Twitch
const client = new tmi.Client({
  channels: ['shaxalyy'] // <-- ton pseudo Twitch
});

client.connect();

client.on('message', (channel, tags, message, self) => {
  if(self) return;

  const avatarUrl = `https://static-cdn.jtvnw.net/jtv_user_pictures/${tags['user-id']}-profile_image-70x70.png`;

  const badges = [];
  if(tags.badges) {
    if(tags.badges.broadcaster) badges.push(BADGE_BROADCASTER_URL);
    if(tags.badges.mod) badges.push(BADGE_MOD_URL);
    if(tags.badges.vip) badges.push(BADGE_VIP_URL);
    if(tags.badges.subscriber) badges.push(BADGE_SUB_URL);
  }

  addMessage(tags['display-name'], message, avatarUrl, badges);
});
</script>
</body>
</html>
